<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challengle</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#6aaa64;
  --yellow:#c9b458;
  --red:#e74c3c;
  --gray:#787c7e;
  --dark-gray:#3a3a3c;
  --light-gray:#d3d6da;
  --key-bg:rgba(211,214,218,.85);
  --bg:#fff;
  --bg-grad:linear-gradient(135deg,#fdf6f0 0%,#f0e6ff 30%,#e6f0ff 60%,#f0fff4 100%);
  --text:#1a1a1b;
  --border:rgba(211,214,218,.7);
  --card-bg:rgba(255,255,255,.6);
  --hint-bg:rgba(240,244,255,.7);
  --hint-border:rgba(197,213,247,.6);
  --locked-bg:rgba(232,232,232,.5);
  --locked-border:rgba(204,204,204,.5);
  --header-border:rgba(224,224,224,.6);
  --header-bg:rgba(255,255,255,.8);
  --input-bg:rgba(255,255,255,.8);
  --accent:#4a6cf7;
  --accent-hover:#3b5de6;
  --success-bg:rgba(232,245,233,.75);
  --fail-bg:rgba(253,236,234,.75);
}

.dark{
  --green:#538d4e;
  --yellow:#b59f3b;
  --red:#c0392b;
  --gray:#3a3a3c;
  --dark-gray:#818384;
  --light-gray:#565758;
  --key-bg:rgba(129,131,132,.85);
  --bg:#121213;
  --bg-grad:linear-gradient(135deg,#0d0d1a 0%,#1a0d2e 30%,#0d1a2e 60%,#0d1a14 100%);
  --text:#d7dadc;
  --border:rgba(58,58,60,.7);
  --card-bg:rgba(26,26,27,.7);
  --hint-bg:rgba(26,31,46,.7);
  --hint-border:rgba(42,58,90,.6);
  --locked-bg:rgba(42,42,43,.5);
  --locked-border:rgba(58,58,60,.5);
  --header-border:rgba(58,58,60,.6);
  --header-bg:rgba(18,18,19,.85);
  --input-bg:rgba(42,42,43,.8);
  --accent:#5b7cf7;
  --accent-hover:#4a6ae6;
  --success-bg:rgba(27,46,27,.75);
  --fail-bg:rgba(46,27,27,.75);
}

body{
  font-family:'Helvetica Neue',Arial,sans-serif;
  background:var(--bg-grad);
  background-attachment:fixed;
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  user-select:none;
  -webkit-user-select:none;
  position:relative;
  overflow-x:hidden;
}

body::before,body::after{
  content:'';
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:.35;
  z-index:0;
  pointer-events:none;
  animation:float 12s ease-in-out infinite alternate;
}

body::before{
  width:400px;
  height:400px;
  background:radial-gradient(circle,rgba(74,108,247,.4),transparent 70%);
  top:-80px;
  right:-100px;
  animation-delay:0s;
}

body::after{
  width:350px;
  height:350px;
  background:radial-gradient(circle,rgba(106,170,100,.35),transparent 70%);
  bottom:-60px;
  left:-80px;
  animation-delay:-6s;
}

.dark body::before,.dark body::after{opacity:.2}

@keyframes float{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(30px,20px) scale(1.1)}
  100%{transform:translate(-20px,40px) scale(.95)}
}

header{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid var(--header-border);
  padding:14px 16px;
  position:relative;
  background:var(--header-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}

header h1{
  font-size:1.8rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  background:linear-gradient(90deg,var(--accent),#e74c9a,var(--green),var(--accent));
  background-size:300% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 6s ease-in-out infinite;
}

@keyframes shimmer{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

.header-left{
  position:absolute;
  left:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.header-right{
  position:absolute;
  right:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.header-btn{
  background:none;
  border:none;
  cursor:pointer;
  font-size:1.3rem;
  color:var(--text);
  padding:4px;
}

#htp-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:200;
  justify-content:center;
  align-items:center;
}
#htp-overlay.active{display:flex}

#htp-modal{
  background:var(--bg);
  color:var(--text);
  border-radius:12px;
  padding:28px 24px;
  max-width:420px;
  width:90%;
  text-align:center;
  position:relative;
  max-height:85vh;
  overflow-y:auto;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  animation:resultPop .4s ease;
}

#htp-modal h2{
  font-size:1.4rem;
  margin-bottom:16px;
}

#htp-modal .htp-text{
  font-size:.95rem;
  line-height:1.7;
  margin-bottom:16px;
  text-align:left;
}

#htp-modal .htp-img{
  width:100%;
  max-width:280px;
  border-radius:10px;
  margin:12px auto;
  display:block;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}

#htp-modal .htp-glhf{
  font-size:1.1rem;
  font-weight:700;
  margin-top:16px;
  letter-spacing:.05em;
}

#htp-close{
  position:absolute;
  top:10px;
  right:14px;
  background:none;
  border:none;
  font-size:1.2rem;
  cursor:pointer;
  color:var(--text);
}

#game-container{
  width:100%;
  max-width:560px;
  padding:20px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  flex:1;
  position:relative;
  z-index:1;
}

#day-label{
  font-size:1.1rem;
  font-weight:700;
  opacity:.6;
  text-transform:uppercase;
  letter-spacing:.15em;
}

#day-nav{
  display:flex;
  align-items:center;
  gap:14px;
}

.day-arrow{
  background:none;
  border:2px solid var(--border);
  border-radius:50%;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:1rem;
  color:var(--text);
  transition:background .15s,border-color .15s,opacity .15s;
}

.day-arrow:hover{border-color:var(--accent);background:var(--hint-bg)}
.day-arrow:disabled{opacity:.25;cursor:not-allowed;border-color:var(--border);background:none}

#day-info{
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
}

#day-date{
  font-size:.7rem;
  opacity:.4;
}

#attempts-bar{
  display:flex;
  gap:8px;
  align-items:center;
}

.attempt-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  border:2px solid var(--border);
  transition:background .3s,border-color .3s;
}

.attempt-dot.used{
  background:var(--red);
  border-color:var(--red);
}

.attempt-dot.correct{
  background:var(--green);
  border-color:var(--green);
}

#attempts-label{
  font-size:.8rem;
  font-weight:600;
  opacity:.6;
  margin-left:4px;
}

#hints-container{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.hint-card{
  width:100%;
  border-radius:8px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  transition:all .4s ease;
}

.hint-card.locked{
  background:var(--locked-bg);
  border:1px solid var(--locked-border);
  opacity:.5;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}

.hint-card.revealed{
  background:var(--hint-bg);
  border:1px solid var(--hint-border);
  opacity:1;
  animation:hintReveal .5s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}

@keyframes hintReveal{
  0%{opacity:0;transform:translateY(-8px)}
  100%{opacity:1;transform:translateY(0)}
}

.hint-number{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.75rem;
  font-weight:700;
  flex-shrink:0;
}

.hint-card.locked .hint-number{
  background:var(--border);
  color:var(--bg);
}

.hint-card.revealed .hint-number{
  background:var(--accent);
  color:#fff;
}

.hint-text{
  font-size:.95rem;
  line-height:1.4;
}

.hint-card.locked .hint-text{
  font-style:italic;
  opacity:.6;
}

#guess-area{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-top:8px;
  position:relative;
}

#guess-input{
  width:100%;
  padding:14px 18px;
  border:2px solid var(--border);
  border-radius:8px;
  font-size:1.1rem;
  font-weight:600;
  text-align:center;
  background:var(--input-bg);
  color:var(--text);
  outline:none;
  transition:border-color .2s;
  font-family:inherit;
}

#guess-input:focus{
  border-color:var(--accent);
}

#guess-input::placeholder{
  color:var(--gray);
  font-weight:400;
}

#guess-input:disabled{
  opacity:.5;
  cursor:not-allowed;
}

#autocomplete{
  display:none;
  position:absolute;
  top:54px;
  left:0;
  right:0;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  max-height:200px;
  overflow-y:auto;
  z-index:30;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

#autocomplete.active{display:block}

.ac-item{
  padding:10px 14px;
  font-size:.85rem;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  transition:background .1s;
}

.ac-item:hover,.ac-item.selected{
  background:var(--hint-bg);
}

.ac-item .ac-name{font-weight:700}
.ac-item .ac-creator{opacity:.5;font-size:.75rem;flex-shrink:0}

#submit-btn{
  width:100%;
  padding:14px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:.08em;
  transition:background .2s,transform .1s;
}

#submit-btn:hover{background:var(--accent-hover)}
#submit-btn:active{transform:scale(.98)}
#submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

#guess-history{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:4px;
}

.past-guess{
  width:100%;
  padding:10px 16px;
  border-radius:6px;
  font-size:.9rem;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:space-between;
  animation:slideIn .3s ease;
}

.past-guess.wrong{
  background:var(--fail-bg);
  border:1px solid var(--red);
  color:var(--red);
}

@keyframes slideIn{
  0%{opacity:0;transform:translateY(-6px)}
  100%{opacity:1;transform:translateY(0)}
}

.past-guess .guess-text{text-transform:uppercase}
.past-guess .guess-x{font-size:1.1rem}

#result-card{
  display:none;
  width:100%;
  border-radius:12px;
  padding:28px 24px;
  text-align:center;
  animation:resultPop .5s ease;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

#result-card.visible{display:block}

#result-card.won{background:var(--success-bg);border:2px solid var(--green)}
#result-card.lost{background:var(--fail-bg);border:2px solid var(--red)}

@keyframes resultPop{
  0%{opacity:0;transform:scale(.9)}
  60%{transform:scale(1.02)}
  100%{opacity:1;transform:scale(1)}
}

#result-card h2{
  font-size:1.5rem;
  margin-bottom:8px;
}

#result-card .answer-reveal{
  font-size:1.3rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  margin:12px 0;
  color:var(--accent);
}

#result-card .result-detail{
  font-size:.9rem;
  opacity:.7;
  margin-bottom:16px;
  line-height:1.5;
}

#result-card .credit{
  font-size:.75rem;
  opacity:.5;
  margin-top:12px;
  font-style:italic;
}

#share-btn{
  width:100%;
  padding:14px;
  background:var(--green);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:.08em;
  transition:background .2s,transform .1s;
  display:none;
  gap:8px;
  align-items:center;
  justify-content:center;
}

#share-btn.visible{display:flex}
#share-btn:hover{filter:brightness(1.1)}
#share-btn:active{transform:scale(.98)}

#share-btn svg{
  width:18px;
  height:18px;
  fill:#fff;
}

#play-again-btn{
  margin-top:12px;
  padding:12px 28px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:.95rem;
  font-weight:700;
  cursor:pointer;
  display:none;
}

#play-again-btn.visible{display:inline-block}

#toast-container{
  position:fixed;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  pointer-events:none;
}

.toast{
  background:var(--text);
  color:var(--bg);
  padding:10px 18px;
  border-radius:4px;
  font-size:.85rem;
  font-weight:700;
  opacity:1;
  transition:opacity .3s;
  pointer-events:none;
}

.toast.fade{opacity:0}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}

.shake{animation:shake .4s ease}

#list-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:200;
  justify-content:center;
  align-items:center;
}
#list-overlay.active{display:flex}

#list-modal{
  background:var(--bg);
  color:var(--text);
  border-radius:12px;
  padding:20px;
  max-width:460px;
  width:92%;
  max-height:80vh;
  display:flex;
  flex-direction:column;
  position:relative;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  animation:resultPop .4s ease;
}

#list-modal h2{
  font-size:1.2rem;
  margin-bottom:12px;
  text-align:center;
}

#list-search{
  width:100%;
  padding:10px 14px;
  border:2px solid var(--border);
  border-radius:6px;
  font-size:.9rem;
  background:var(--input-bg);
  color:var(--text);
  outline:none;
  font-family:inherit;
  margin-bottom:10px;
}

#list-search:focus{border-color:var(--accent)}

#list-count{
  font-size:.7rem;
  text-align:center;
  opacity:.5;
  margin-bottom:6px;
}

#list-entries{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:2px;
}

.list-entry{
  padding:8px 12px;
  border-radius:4px;
  font-size:.82rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.list-entry:nth-child(odd){background:var(--card-bg)}

.list-entry .entry-name{font-weight:700}
.list-entry .entry-creator{opacity:.6;font-size:.75rem;text-align:right;flex-shrink:0}

#list-close{
  position:absolute;
  top:10px;
  right:14px;
  background:none;
  border:none;
  font-size:1.2rem;
  cursor:pointer;
  color:var(--text);
}

@media(max-width:400px){
  header h1{font-size:1.4rem}
  .hint-card{padding:10px 14px}
  .hint-text{font-size:.85rem}
  #guess-input{padding:12px 14px;font-size:1rem}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="header-btn" id="help-btn" aria-label="How to play">?</button>
    <button class="header-btn" id="list-btn" aria-label="Challenge list" style="font-size:1.1rem">&#9776;</button>
  </div>
  <h1>Challengle</h1>
  <div class="header-right">
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode">&#9790;</button>
  </div>
</header>

<div id="htp-overlay">
  <div id="htp-modal">
    <button id="htp-close">&times;</button>
    <h2>How to Play</h2>
    <div class="htp-text">
      You have 5 hints to guess a challenge from the list or gdsr wave. Each wrong guess unlocks the next hint. Can you solve it before running out of guesses?

<script>
// START_DATE is Day 1. Add one puzzle per day to the PUZZLES array.
// The game auto-selects today's puzzle based on the date.
const START_DATE = new Date("2026-06-20T00:00:00");

const PUZZLES = [
  {
    day: 1,
    hints: ["Tiny length", "Mini wave challenge", "Bottom of legacy", "Silver in gdsr wave", "Created and verified by sizzli"],
    answer: "funk god",
    credit: "Created and verified by sizzli"
  },
  {
    day: 2,
    hints: ["Wave Challenge", "Mid Main List", "Short Length (14s)", "Not on GDSR Wave", "Created by jcack and verified by Yossarian"],
    answer: "philly",
    credit: "Created by jcack"
  },
  {
    day: 3,
    hints: ["Short Length (17s)", "Diamond on GDSR Cube", "Cube Challenge", "High Legacy List", "Created by cookiezzzzzzzz and verified by awesomerobot20"],
    answer: "c u h",
    credit: "Created by cookiezzzzzzzz"
  },
  {
    day: 4,
    hints: ["Not on GDSR Wave", "High Legacy List", "Wave Challenge", "Tiny Length (3s)", "Created by Nyan Cat and maxmur, verified by maxmur"],
    answer: "beside you",
    credit: "Created by Nyan Cat and maxmur"
  },
  {
    day: 5,
    hints: ["Removed from List", "Mixed Challenge", "Short Length (20s)", "Diamond on GDSR Mixed", "Created by Hyperlith and lolwut, verified by Hyperlith"],
    answer: "el3ctr0b4llz",
    credit: "Created by Hyperlith and lolwut"
  },
  {
    day: 6,
    hints: ["Ship Challenge", "Short Length (20s)", "Not on GDSR Ship", "High Legacy List", "Created and verified by ProStylePancake"],
    answer: "final spark",
    credit: "Created by ProStylePancake"
  }
];

const MAX_GUESSES = 5;

let currentPuzzle = null;
let currentDayIndex = 0;
let hintsRevealed = 0;
let guesses = [];
let gameOver = false;

function getTodayIndex() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const start = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
  const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  return Math.min(Math.max(diff, 0), PUZZLES.length - 1);
}

function getDateForDay(dayIndex) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + dayIndex);
  return d;
}

function formatDate(d) {
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function saveState() {
  const state = {
    day: currentPuzzle.day,
    guesses,
    hintsRevealed,
    gameOver
  };
  localStorage.setItem(`challengle-state-day${currentPuzzle.day}`, JSON.stringify(state));
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(`challengle-state-day${currentPuzzle.day}`));
    if (s && s.day === currentPuzzle.day) return s;
  } catch {}
  return null;
}

function loadPuzzle(index) {
  currentDayIndex = index;
  currentPuzzle = PUZZLES[index];

  document.getElementById("day-label").textContent = `Day ${currentPuzzle.day}`;
  document.getElementById("day-date").textContent = formatDate(getDateForDay(index));

  const todayIdx = getTodayIndex();
  document.getElementById("day-prev").disabled = (index <= 0);
  document.getElementById("day-next").disabled = (index >= todayIdx);

  const saved = loadState();
  if (saved) {
    guesses = saved.guesses;
    hintsRevealed = saved.hintsRevealed;
    gameOver = saved.gameOver;
  } else {
    hintsRevealed = 1;
    guesses = [];
    gameOver = false;
  }

  renderAttempts();
  renderHints();
  renderGuessHistory();

  const ac = document.getElementById("autocomplete");
  ac.classList.remove("active");
  ac.innerHTML = "";

  if (gameOver) {
    const won = guesses.length > 0 && guesses[guesses.length - 1].correct;
    document.getElementById("guess-input").disabled = true;
    document.getElementById("guess-input").value = "";
    document.getElementById("submit-btn").disabled = true;
    showResult(won);
  } else {
    document.getElementById("guess-input").disabled = false;
    document.getElementById("guess-input").value = "";
    document.getElementById("submit-btn").disabled = false;

    const result = document.getElementById("result-card");
    result.classList.remove("visible", "won", "lost");
    result.style.display = "none";

    document.getElementById("play-again-btn").classList.remove("visible");
    document.getElementById("share-btn").classList.remove("visible");
  }
}

function renderAttempts() {
  const bar = document.getElementById("attempts-bar");
  bar.innerHTML = "";

  for (let i = 0; i < MAX_GUESSES; i++) {
    const dot = document.createElement("div");
    dot.className = "attempt-dot";
    if (i < guesses.length) {
      dot.classList.add(guesses[i].correct ? "correct" : "used");
    }
    bar.appendChild(dot);
  }

  const label = document.createElement("span");
  label.id = "attempts-label";
  const remaining = MAX_GUESSES - guesses.length;
  label.textContent = gameOver ? "" : `${remaining} guess${remaining !== 1 ? "es" : ""} left`;
  bar.appendChild(label);
}

function renderHints() {
  const container = document.getElementById("hints-container");
  container.innerHTML = "";

  for (let i = 0; i < currentPuzzle.hints.length; i++) {
    const card = document.createElement("div");
    card.className = "hint-card " + (i < hintsRevealed ? "revealed" : "locked");

    const num = document.createElement("div");
    num.className = "hint-number";
    num.textContent = i + 1;

    const text = document.createElement("div");
    text.className = "hint-text";
    text.textContent = i < hintsRevealed ? currentPuzzle.hints[i] : "Locked — guess wrong to reveal";

    card.appendChild(num);
    card.appendChild(text);
    container.appendChild(card);
  }
}

function renderGuessHistory() {
  const container = document.getElementById("guess-history");
  container.innerHTML = "";

  guesses.forEach(g => {
    const el = document.createElement("div");
    el.className = "past-guess wrong";
    el.innerHTML = `<span class="guess-text">${escapeHtml(g.text)}</span><span class="guess-x">✗</span>`;
    container.appendChild(el);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function submitGuess() {
  if (gameOver) return;

  const ac = document.getElementById("autocomplete");
  const acItems = ac.querySelectorAll(".ac-item");
  if (ac.classList.contains("active") && acIndex >= 0 && acItems[acIndex]) {
    document.getElementById("guess-input").value = acItems[acIndex].querySelector(".ac-name").textContent;
    ac.classList.remove("active");
    ac.innerHTML = "";
    acIndex = -1;
    return;
  }
  ac.classList.remove("active");
  ac.innerHTML = "";

  const input = document.getElementById("guess-input");
  const guess = input.value.trim().toLowerCase();

  if (!guess) {
    showToast("Type a guess first");
    input.classList.add("shake");
    input.addEventListener("animationend", () => input.classList.remove("shake"), { once: true });
    return;
  }

  if (guesses.some(g => g.text === guess)) {
    showToast("Already guessed that");
    input.classList.add("shake");
    input.addEventListener("animationend", () => input.classList.remove("shake"), { once: true });
    return;
  }

  const isCorrect = guess === currentPuzzle.answer.toLowerCase();

  guesses.push({ text: guess, correct: isCorrect });
  input.value = "";

  if (isCorrect) {
    gameOver = true;
    saveState();
    renderAttempts();
    showResult(true);
    return;
  }

  if (hintsRevealed < currentPuzzle.hints.length) {
    hintsRevealed++;
  }

  saveState();
  renderAttempts();
  renderHints();
  renderGuessHistory();

  if (guesses.length >= MAX_GUESSES) {
    gameOver = true;
    saveState();
    showResult(false);
    return;
  }

  document.getElementById("guess-input").focus();
}

function showResult(won) {
  document.getElementById("guess-input").disabled = true;
  document.getElementById("submit-btn").disabled = true;

  const card = document.getElementById("result-card");
  card.style.display = "block";

  requestAnimationFrame(() => {
    card.classList.add("visible", won ? "won" : "lost");
  });

  document.getElementById("result-title").textContent =
    won ? "Correct!" : "Not this time";
  document.getElementById("result-answer").textContent = currentPuzzle.answer;
  document.getElementById("result-detail").textContent =
    won
      ? `You got it in ${guesses.length} guess${guesses.length !== 1 ? "es" : ""} with ${hintsRevealed} hint${hintsRevealed !== 1 ? "s" : ""} revealed.`
      : `The answer was revealed above. Better luck next time!`;
  document.getElementById("result-credit").textContent = currentPuzzle.credit;

  if (!won) {
    hintsRevealed = currentPuzzle.hints.length;
    renderHints();
    renderGuessHistory();
  }

  document.getElementById("share-btn").classList.add("visible");

  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function generateShareText() {
  const won = guesses.length > 0 && guesses[guesses.length - 1].correct;
  const totalHints = currentPuzzle.hints.length;

  let text = `Challengle - Day ${currentPuzzle.day}\n\n`;

  const guessLine = guesses.map(g => g.correct ? "\u{1F7E9}" : "\u{1F7E5}").join("");
  const remaining = MAX_GUESSES - guesses.length;
  const emptyLine = "⬜".repeat(remaining);
  text += guessLine + emptyLine + "\n";

  const hintLine = [];
  for (let i = 0; i < totalHints; i++) {
    hintLine.push(i < hintsRevealed ? "\u{1F513}" : "\u{1F512}");
  }
  text += hintLine.join("") + "\n\n";

  if (won) {
    text += `Solved in ${guesses.length}/${MAX_GUESSES} guesses\n`;
    text += `\u{1F4A1} ${hintsRevealed}/${totalHints} hints used`;
  } else {
    text += `${MAX_GUESSES}/${MAX_GUESSES} guesses - not solved`;
  }

  text += `\n\nhttps://challengle.pages.dev`;

  return text;
}

function shareScore() {
  const text = generateShareText();

  if (navigator.share) {
    navigator.share({ text }).catch(() => {
      copyToClipboard(text);
    });
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast("Copied to clipboard!");
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("Copied to clipboard!");
  });
}

function showToast(msg, duration = 1500) {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = msg;
  container.prepend(toast);
  setTimeout(() => toast.classList.add("fade"), duration);
  setTimeout(() => toast.remove(), duration + 400);
}

function renderChallengeList(filter) {
  const entries = document.getElementById("list-entries");
  const countEl = document.getElementById("list-count");
  entries.innerHTML = "";
  const q = (filter || "").toLowerCase();
  const filtered = CHALLENGE_LIST.filter(([name, creator]) =>
    name.toLowerCase().includes(q) || creator.toLowerCase().includes(q)
  );
  countEl.textContent = `${filtered.length} of ${CHALLENGE_LIST.length} challenges`;
  filtered.forEach(([name, creator]) => {
    const el = document.createElement("div");
    el.className = "list-entry";
    el.innerHTML = `<span class="entry-name">${name}</span><span class="entry-creator">${creator}</span>`;
    entries.appendChild(el);
  });
}

let acIndex = -1;

function updateAutocomplete() {
  const input = document.getElementById("guess-input");
  const ac = document.getElementById("autocomplete");
  const q = input.value.trim().toLowerCase();
  acIndex = -1;

  if (!q || gameOver) {
    ac.classList.remove("active");
    ac.innerHTML = "";
    return;
  }

  const matches = CHALLENGE_LIST.filter(([name]) =>
    name.toLowerCase().includes(q)
  ).slice(0, 8);

  if (matches.length === 0) {
    ac.classList.remove("active");
    ac.innerHTML = "";
    return;
  }

  ac.innerHTML = "";
  matches.forEach(([name, creator], i) => {
    const el = document.createElement("div");
    el.className = "ac-item";
    el.innerHTML = `<span class="ac-name">${escapeHtml(name)}</span><span class="ac-creator">${escapeHtml(creator)}</span>`;
    el.addEventListener("mousedown", e => {
      e.preventDefault();
      input.value = name;
      ac.classList.remove("active");
      ac.innerHTML = "";
    });
    ac.appendChild(el);
  });
  ac.classList.add("active");
}

document.getElementById("guess-input").addEventListener("input", updateAutocomplete);
document.getElementById("guess-input").addEventListener("focus", updateAutocomplete);
document.getElementById("guess-input").addEventListener("blur", () => {
  setTimeout(() => {
    document.getElementById("autocomplete").classList.remove("active");
  }, 150);
});
document.getElementById("guess-input").addEventListener("keydown", e => {
  const ac = document.getElementById("autocomplete");
  const items = ac.querySelectorAll(".ac-item");
  if (!ac.classList.contains("active") || items.length === 0) return;

  if (e.key === "ArrowDown") {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle("selected", i === acIndex));
    items[acIndex].scrollIntoView({ block: "nearest" });
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle("selected", i === acIndex));
    items[acIndex].scrollIntoView({ block: "nearest" });
  } else if (e.key === "Tab" && acIndex >= 0) {
    e.preventDefault();
    const name = items[acIndex].querySelector(".ac-name").textContent;
    document.getElementById("guess-input").value = name;
    ac.classList.remove("active");
    ac.innerHTML = "";
  }
});

  document.getElementById("theme-toggle").innerHTML = isDark ? "&#9788;" : "&#9790;";
});

  if (currentDayIndex > 0) loadPuzzle(currentDayIndex - 1);
});
document.getElementById("day-next").addEventListener("click", () => {
  const todayIdx = getTodayIndex();
  if (currentDayIndex < todayIdx) loadPuzzle(currentDayIndex + 1);
});

(function init() {
  const theme = localStorage.getItem("challengle-theme");
  if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme:dark)").matches)) {
    document.body.classList.add("dark");
    document.getElementById("theme-toggle").innerHTML = "&#9788;";
  }
  loadPuzzle(getTodayIndex());
  document.getElementById("guess-input").focus();
})();
