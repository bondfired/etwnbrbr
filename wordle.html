<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challengle</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#6aaa64;
  --yellow:#c9b458;
  --red:#e74c3c;
  --gray:#787c7e;
  --dark-gray:#3a3a3c;
  --light-gray:#d3d6da;
  --key-bg:#d3d6da;
  --bg:#fff;
  --text:#1a1a1b;
  --border:#d3d6da;
  --card-bg:#f7f7f7;
  --hint-bg:#f0f4ff;
  --hint-border:#c5d5f7;
  --locked-bg:#e8e8e8;
  --locked-border:#ccc;
  --header-border:#e0e0e0;
  --input-bg:#fff;
  --accent:#4a6cf7;
  --accent-hover:#3b5de6;
  --success-bg:#e8f5e9;
  --fail-bg:#fdecea;
}

.dark{
  --green:#538d4e;
  --yellow:#b59f3b;
  --red:#c0392b;
  --gray:#3a3a3c;
  --dark-gray:#818384;
  --light-gray:#565758;
  --key-bg:#818384;
  --bg:#121213;
  --text:#d7dadc;
  --border:#3a3a3c;
  --card-bg:#1a1a1b;
  --hint-bg:#1a1f2e;
  --hint-border:#2a3a5a;
  --locked-bg:#2a2a2b;
  --locked-border:#3a3a3c;
  --header-border:#3a3a3c;
  --input-bg:#2a2a2b;
  --accent:#5b7cf7;
  --accent-hover:#4a6ae6;
  --success-bg:#1b2e1b;
  --fail-bg:#2e1b1b;
}

body{
  font-family:'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  user-select:none;
  -webkit-user-select:none;
}

header{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid var(--header-border);
  padding:14px 16px;
  position:relative;
  background:var(--bg);
}

header h1{
  font-size:1.8rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
}

.header-right{
  position:absolute;
  right:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.header-btn{
  background:none;
  border:none;
  cursor:pointer;
  font-size:1.3rem;
  color:var(--text);
  padding:4px;
}

#game-container{
  width:100%;
  max-width:560px;
  padding:20px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  flex:1;
}

#day-label{
  font-size:1.1rem;
  font-weight:700;
  opacity:.6;
  text-transform:uppercase;
  letter-spacing:.15em;
}

#attempts-bar{
  display:flex;
  gap:8px;
  align-items:center;
}

.attempt-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  border:2px solid var(--border);
  transition:background .3s,border-color .3s;
}

.attempt-dot.used{
  background:var(--red);
  border-color:var(--red);
}

.attempt-dot.correct{
  background:var(--green);
  border-color:var(--green);
}

#attempts-label{
  font-size:.8rem;
  font-weight:600;
  opacity:.6;
  margin-left:4px;
}

#hints-container{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.hint-card{
  width:100%;
  border-radius:8px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  transition:all .4s ease;
}

.hint-card.locked{
  background:var(--locked-bg);
  border:1px solid var(--locked-border);
  opacity:.5;
}

.hint-card.revealed{
  background:var(--hint-bg);
  border:1px solid var(--hint-border);
  opacity:1;
  animation:hintReveal .5s ease;
}

@keyframes hintReveal{
  0%{opacity:0;transform:translateY(-8px)}
  100%{opacity:1;transform:translateY(0)}
}

.hint-number{
  width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.75rem;
  font-weight:700;
  flex-shrink:0;
}

.hint-card.locked .hint-number{
  background:var(--border);
  color:var(--bg);
}

.hint-card.revealed .hint-number{
  background:var(--accent);
  color:#fff;
}

.hint-text{
  font-size:.95rem;
  line-height:1.4;
}

.hint-card.locked .hint-text{
  font-style:italic;
  opacity:.6;
}

#guess-area{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-top:8px;
}

#guess-input{
  width:100%;
  padding:14px 18px;
  border:2px solid var(--border);
  border-radius:8px;
  font-size:1.1rem;
  font-weight:600;
  text-align:center;
  background:var(--input-bg);
  color:var(--text);
  outline:none;
  transition:border-color .2s;
  font-family:inherit;
}

#guess-input:focus{
  border-color:var(--accent);
}

#guess-input::placeholder{
  color:var(--gray);
  font-weight:400;
}

#guess-input:disabled{
  opacity:.5;
  cursor:not-allowed;
}

#submit-btn{
  width:100%;
  padding:14px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:.08em;
  transition:background .2s,transform .1s;
}

#submit-btn:hover{background:var(--accent-hover)}
#submit-btn:active{transform:scale(.98)}
#submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

#guess-history{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:4px;
}

.past-guess{
  width:100%;
  padding:10px 16px;
  border-radius:6px;
  font-size:.9rem;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:space-between;
  animation:slideIn .3s ease;
}

.past-guess.wrong{
  background:var(--fail-bg);
  border:1px solid var(--red);
  color:var(--red);
}

@keyframes slideIn{
  0%{opacity:0;transform:translateY(-6px)}
  100%{opacity:1;transform:translateY(0)}
}

.past-guess .guess-text{text-transform:uppercase}
.past-guess .guess-x{font-size:1.1rem}

#result-card{
  display:none;
  width:100%;
  border-radius:12px;
  padding:28px 24px;
  text-align:center;
  animation:resultPop .5s ease;
}

#result-card.visible{display:block}

#result-card.won{background:var(--success-bg);border:2px solid var(--green)}
#result-card.lost{background:var(--fail-bg);border:2px solid var(--red)}

@keyframes resultPop{
  0%{opacity:0;transform:scale(.9)}
  60%{transform:scale(1.02)}
  100%{opacity:1;transform:scale(1)}
}

#result-card h2{
  font-size:1.5rem;
  margin-bottom:8px;
}

#result-card .answer-reveal{
  font-size:1.3rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  margin:12px 0;
  color:var(--accent);
}

#result-card .result-detail{
  font-size:.9rem;
  opacity:.7;
  margin-bottom:16px;
  line-height:1.5;
}

#result-card .credit{
  font-size:.75rem;
  opacity:.5;
  margin-top:12px;
  font-style:italic;
}

#play-again-btn{
  margin-top:12px;
  padding:12px 28px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:.95rem;
  font-weight:700;
  cursor:pointer;
  display:none;
}

#play-again-btn.visible{display:inline-block}

#toast-container{
  position:fixed;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  pointer-events:none;
}

.toast{
  background:var(--text);
  color:var(--bg);
  padding:10px 18px;
  border-radius:4px;
  font-size:.85rem;
  font-weight:700;
  opacity:1;
  transition:opacity .3s;
  pointer-events:none;
}

.toast.fade{opacity:0}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}

.shake{animation:shake .4s ease}

@media(max-width:400px){
  header h1{font-size:1.4rem}
  .hint-card{padding:10px 14px}
  .hint-text{font-size:.85rem}
  #guess-input{padding:12px 14px;font-size:1rem}
}
</style>
</head>
<body>

<header>
  <h1>Challengle</h1>
  <div class="header-right">
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode">&#9790;</button>
  </div>
</header>

<div id="toast-container"></div>

<div id="game-container">
  <div id="day-label"></div>

  <div id="attempts-bar"></div>

  <div id="hints-container"></div>

  <div id="guess-area">
    <input type="text" id="guess-input" placeholder="Type your answer..." autocomplete="off" spellcheck="false">
    <button id="submit-btn">Submit Guess</button>
  </div>

  <div id="guess-history"></div>

  <div id="result-card">
    <h2 id="result-title"></h2>
    <div class="answer-reveal" id="result-answer"></div>
    <div class="result-detail" id="result-detail"></div>
    <div class="credit" id="result-credit"></div>
  </div>

  <button id="play-again-btn">View Hints Again</button>
</div>

<script>
const PUZZLES = [
  {
    day: 1,
    hints: [
      "Tiny length",
      "Primary mini wave",
      "Bottom of legacy",
      "Silver in gdsr wave",
      "Created and verified by sizzli"
    ],
    answer: "funk god",
    credit: "Created and verified by sizzli"
  }
];

const MAX_GUESSES = 5;

let currentPuzzle = null;
let hintsRevealed = 0;
let guesses = [];
let gameOver = false;

function loadPuzzle(index) {
  currentPuzzle = PUZZLES[index];
  hintsRevealed = 1;
  guesses = [];
  gameOver = false;

  document.getElementById("day-label").textContent = `Day ${currentPuzzle.day}`;

  renderAttempts();
  renderHints();
  renderGuessHistory();

  document.getElementById("guess-input").disabled = false;
  document.getElementById("guess-input").value = "";
  document.getElementById("submit-btn").disabled = false;

  const result = document.getElementById("result-card");
  result.classList.remove("visible", "won", "lost");
  result.style.display = "none";

  document.getElementById("play-again-btn").classList.remove("visible");
}

function renderAttempts() {
  const bar = document.getElementById("attempts-bar");
  bar.innerHTML = "";

  for (let i = 0; i < MAX_GUESSES; i++) {
    const dot = document.createElement("div");
    dot.className = "attempt-dot";
    if (i < guesses.length) {
      dot.classList.add(guesses[i].correct ? "correct" : "used");
    }
    bar.appendChild(dot);
  }

  const label = document.createElement("span");
  label.id = "attempts-label";
  const remaining = MAX_GUESSES - guesses.length;
  label.textContent = gameOver ? "" : `${remaining} guess${remaining !== 1 ? "es" : ""} left`;
  bar.appendChild(label);
}

function renderHints() {
  const container = document.getElementById("hints-container");
  container.innerHTML = "";

  for (let i = 0; i < currentPuzzle.hints.length; i++) {
    const card = document.createElement("div");
    card.className = "hint-card " + (i < hintsRevealed ? "revealed" : "locked");

    const num = document.createElement("div");
    num.className = "hint-number";
    num.textContent = i + 1;

    const text = document.createElement("div");
    text.className = "hint-text";
    text.textContent = i < hintsRevealed ? currentPuzzle.hints[i] : "Locked — guess wrong to reveal";

    card.appendChild(num);
    card.appendChild(text);
    container.appendChild(card);
  }
}

function renderGuessHistory() {
  const container = document.getElementById("guess-history");
  container.innerHTML = "";

  guesses.forEach(g => {
    const el = document.createElement("div");
    el.className = "past-guess wrong";
    el.innerHTML = `<span class="guess-text">${escapeHtml(g.text)}</span><span class="guess-x">✗</span>`;
    container.appendChild(el);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function submitGuess() {
  if (gameOver) return;

  const input = document.getElementById("guess-input");
  const guess = input.value.trim().toLowerCase();

  if (!guess) {
    showToast("Type a guess first");
    input.classList.add("shake");
    input.addEventListener("animationend", () => input.classList.remove("shake"), { once: true });
    return;
  }

  if (guesses.some(g => g.text === guess)) {
    showToast("Already guessed that");
    input.classList.add("shake");
    input.addEventListener("animationend", () => input.classList.remove("shake"), { once: true });
    return;
  }

  const isCorrect = guess === currentPuzzle.answer.toLowerCase();

  guesses.push({ text: guess, correct: isCorrect });
  input.value = "";

  if (isCorrect) {
    gameOver = true;
    renderAttempts();
    showResult(true);
    return;
  }

  if (hintsRevealed < currentPuzzle.hints.length) {
    hintsRevealed++;
  }

  renderAttempts();
  renderHints();
  renderGuessHistory();

  if (guesses.length >= MAX_GUESSES) {
    gameOver = true;
    showResult(false);
    return;
  }

  document.getElementById("guess-input").focus();
}

function showResult(won) {
  document.getElementById("guess-input").disabled = true;
  document.getElementById("submit-btn").disabled = true;

  const card = document.getElementById("result-card");
  card.style.display = "block";

  requestAnimationFrame(() => {
    card.classList.add("visible", won ? "won" : "lost");
  });

  document.getElementById("result-title").textContent =
    won ? "Correct!" : "Not this time";
  document.getElementById("result-answer").textContent = currentPuzzle.answer;
  document.getElementById("result-detail").textContent =
    won
      ? `You got it in ${guesses.length} guess${guesses.length !== 1 ? "es" : ""} with ${hintsRevealed} hint${hintsRevealed !== 1 ? "s" : ""} revealed.`
      : `The answer was revealed above. Better luck next time!`;
  document.getElementById("result-credit").textContent = currentPuzzle.credit;

  if (!won) {
    hintsRevealed = currentPuzzle.hints.length;
    renderHints();
    renderGuessHistory();
  }

  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function showToast(msg, duration = 1500) {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = msg;
  container.prepend(toast);
  setTimeout(() => toast.classList.add("fade"), duration);
  setTimeout(() => toast.remove(), duration + 400);
}

document.getElementById("submit-btn").addEventListener("click", submitGuess);

document.getElementById("guess-input").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    submitGuess();
  }
});

document.getElementById("theme-toggle").addEventListener("click", () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("challengle-theme", isDark ? "dark" : "light");
  document.getElementById("theme-toggle").innerHTML = isDark ? "&#9788;" : "&#9790;";
});

(function init() {
  const theme = localStorage.getItem("challengle-theme");
  if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme:dark)").matches)) {
    document.body.classList.add("dark");
    document.getElementById("theme-toggle").innerHTML = "&#9788;";
  }
  loadPuzzle(0);
  document.getElementById("guess-input").focus();
})();
</script>
</body>
</html>
