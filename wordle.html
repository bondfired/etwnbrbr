<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctordle</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#6aaa64;
  --yellow:#c9b458;
  --gray:#787c7e;
  --dark-gray:#3a3a3c;
  --light-gray:#d3d6da;
  --white:#fff;
  --black:#212121;
  --key-bg:#d3d6da;
  --bg:#fff;
  --text:#1a1a1b;
  --border:#d3d6da;
  --empty-border:#878a8c;
  --card-bg:#f7f7f7;
  --solved-bg:#e8f5e9;
  --header-border:#e0e0e0;
}

.dark{
  --green:#538d4e;
  --yellow:#b59f3b;
  --gray:#3a3a3c;
  --dark-gray:#818384;
  --light-gray:#565758;
  --white:#d7dadc;
  --black:#d7dadc;
  --key-bg:#818384;
  --bg:#121213;
  --text:#d7dadc;
  --border:#3a3a3c;
  --empty-border:#3a3a3c;
  --card-bg:#1a1a1b;
  --solved-bg:#1b2e1b;
  --header-border:#3a3a3c;
}

body{
  font-family:'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  user-select:none;
  -webkit-user-select:none;
}

header{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid var(--header-border);
  padding:10px 16px;
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:50;
}

header h1{
  font-size:1.6rem;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.header-left,.header-right{
  position:absolute;
  display:flex;
  align-items:center;
  gap:8px;
}
.header-left{left:16px}
.header-right{right:16px}

.header-btn{
  background:none;
  border:none;
  cursor:pointer;
  font-size:1.3rem;
  color:var(--text);
  padding:4px;
}

#guess-counter{
  font-size:.85rem;
  font-weight:700;
  color:var(--text);
  opacity:.8;
}

#progress-bar{
  width:100%;
  height:4px;
  background:var(--border);
}

#progress-fill{
  height:100%;
  width:0%;
  background:var(--green);
  transition:width .4s ease;
}

#current-input{
  width:100%;
  display:flex;
  justify-content:center;
  gap:4px;
  padding:10px 0 6px;
  position:sticky;
  top:49px;
  background:var(--bg);
  z-index:40;
}

.input-tile{
  width:44px;
  height:44px;
  border:2px solid var(--empty-border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  font-weight:700;
  text-transform:uppercase;
  color:var(--text);
  background:var(--bg);
}

.input-tile.filled{
  border-color:var(--text);
  animation:pop .1s ease-in-out;
}

#boards-container{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:8px;
  width:100%;
  max-width:900px;
  flex:1;
  overflow-y:auto;
}

.board-card{
  background:var(--card-bg);
  border-radius:6px;
  padding:6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  position:relative;
  transition:background .3s;
}

.board-card.solved{
  background:var(--solved-bg);
}

.board-label{
  font-size:.65rem;
  font-weight:700;
  opacity:.5;
  margin-bottom:2px;
}

.mini-row{
  display:flex;
  gap:2px;
}

.mini-tile{
  width:clamp(12px,3.5vw,22px);
  height:clamp(12px,3.5vw,22px);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(6px,1.8vw,11px);
  font-weight:700;
  text-transform:uppercase;
  color:var(--text);
}

.mini-tile.correct{background:var(--green);border-color:var(--green);color:#fff}
.mini-tile.present{background:var(--yellow);border-color:var(--yellow);color:#fff}
.mini-tile.absent{background:var(--gray);border-color:var(--gray);color:#fff}
.mini-tile.empty-solved{border-color:transparent;background:transparent}

.solved-badge{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:1.6rem;
  opacity:0;
  animation:badgePop .4s ease forwards;
  pointer-events:none;
  z-index:5;
}

@keyframes badgePop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0)}
  60%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}
}

.board-card.solved .mini-row{opacity:.6}

#keyboard-area{
  position:sticky;
  bottom:0;
  width:100%;
  background:var(--bg);
  padding:6px 0 10px;
  border-top:1px solid var(--header-border);
  z-index:40;
}

#keyboard{
  display:flex;
  flex-direction:column;
  gap:5px;
  padding:0 6px;
  width:100%;
  max-width:520px;
  margin:0 auto;
}

.kb-row{
  display:flex;
  justify-content:center;
  gap:4px;
}

.key{
  height:52px;
  min-width:28px;
  padding:0 5px;
  border:none;
  border-radius:4px;
  background:var(--key-bg);
  color:var(--text);
  font-size:.8rem;
  font-weight:700;
  text-transform:uppercase;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:1;
  max-width:40px;
  transition:background .15s,color .15s;
  -webkit-tap-highlight-color:transparent;
}

.key.wide{
  max-width:62px;
  font-size:.7rem;
}

.key.correct{background:var(--green);color:#fff}
.key.present{background:var(--yellow);color:#fff}
.key.absent{background:var(--dark-gray);color:#fff}

#toast-container{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  pointer-events:none;
}

.toast{
  background:var(--text);
  color:var(--bg);
  padding:10px 18px;
  border-radius:4px;
  font-size:.85rem;
  font-weight:700;
  opacity:1;
  transition:opacity .3s;
  pointer-events:none;
}

.toast.fade{opacity:0}

@keyframes pop{
  0%{transform:scale(1)}
  50%{transform:scale(1.12)}
  100%{transform:scale(1)}
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-5px)}
  40%{transform:translateX(5px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

.shake{animation:shake .4s ease}

#modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:200;
  justify-content:center;
  align-items:center;
}
#modal-overlay.active{display:flex}

#modal{
  background:var(--bg);
  color:var(--text);
  border-radius:8px;
  padding:28px;
  max-width:420px;
  width:90%;
  text-align:center;
  position:relative;
  max-height:80vh;
  overflow-y:auto;
}

#modal h2{margin-bottom:12px;font-size:1.3rem}
#modal p{margin-bottom:10px;font-size:.95rem;line-height:1.5}

.stat-row{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:14px 0;
}

.stat-item{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.stat-item .num{font-size:1.8rem;font-weight:700}
.stat-item .label{font-size:.65rem;text-transform:uppercase;color:var(--dark-gray)}

#play-again{
  margin-top:14px;
  padding:10px 28px;
  background:var(--green);
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
}

#modal-close{
  position:absolute;
  top:10px;
  right:14px;
  background:none;
  border:none;
  font-size:1.2rem;
  cursor:pointer;
  color:var(--text);
}

#word-list{
  text-align:left;
  margin-top:12px;
  columns:2;
  column-gap:16px;
  font-size:.8rem;
  line-height:1.8;
}

#word-list span{
  display:inline-block;
  width:100%;
}

#word-list .solved-word{color:var(--green);font-weight:700}
#word-list .missed-word{color:var(--gray)}

@media(max-width:600px){
  #boards-container{grid-template-columns:repeat(4,1fr);gap:5px;padding:5px}
  .board-card{padding:4px}
  .mini-tile{width:clamp(10px,4vw,18px);height:clamp(10px,4vw,18px);font-size:clamp(5px,2vw,9px)}
  .key{height:46px;font-size:.72rem}
  .input-tile{width:38px;height:38px;font-size:1.3rem}
  header h1{font-size:1.3rem}
}

@media(max-width:400px){
  .mini-tile{width:11px;height:11px;font-size:5.5px;border-width:.5px}
  .mini-row{gap:1px}
  .board-card{padding:3px;gap:1px}
  #boards-container{gap:3px;padding:3px}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span id="guess-counter">21 left</span>
  </div>
  <h1>Doctordle</h1>
  <div class="header-right">
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode">&#9790;</button>
  </div>
</header>
<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="toast-container"></div>

<div id="current-input"></div>

<div id="boards-container"></div>

<div id="keyboard-area">
  <div id="keyboard"></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">&times;</button>
    <h2 id="modal-title"></h2>
    <p id="modal-subtitle"></p>
    <div class="stat-row">
      <div class="stat-item"><span class="num" id="stat-solved">0</span><span class="label">Solved</span></div>
      <div class="stat-item"><span class="num" id="stat-total">16</span><span class="label">Total</span></div>
      <div class="stat-item"><span class="num" id="stat-guesses">0</span><span class="label">Guesses</span></div>
    </div>
    <div id="word-list"></div>
    <button id="play-again">Play Again</button>
  </div>
</div>

const VALID_GUESSES = new Set(WORDS);
const NUM_BOARDS = 16;
const MAX_GUESSES = 21;
const WORD_LENGTH = 5;

let answers = [];
let boards = [];
let solved = [];
let guessNum = 0;
let currentGuess = [];
let gameOver = false;
let revealInProgress = false;

function pickUniqueWords(n) {
  const shuffled = [...WORDS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function createInputRow() {
  const container = document.getElementById("current-input");
  container.innerHTML = "";
  for (let c = 0; c < WORD_LENGTH; c++) {
    const tile = document.createElement("div");
    tile.className = "input-tile";
    tile.id = `input-${c}`;
    container.appendChild(tile);
  }
}

function createBoards() {
  const container = document.getElementById("boards-container");
  container.innerHTML = "";
  boards = [];

  for (let b = 0; b < NUM_BOARDS; b++) {
    const card = document.createElement("div");
    card.className = "board-card";
    card.id = `board-${b}`;

    const label = document.createElement("div");
    label.className = "board-label";
    label.textContent = `#${b + 1}`;
    card.appendChild(label);

    const boardData = [];

    for (let r = 0; r < MAX_GUESSES; r++) {
      const row = document.createElement("div");
      row.className = "mini-row";
      row.id = `b${b}-row-${r}`;
      row.style.display = "none";
      const rowTiles = [];
      for (let c = 0; c < WORD_LENGTH; c++) {
        const tile = document.createElement("div");
        tile.className = "mini-tile";
        tile.id = `b${b}-t${r}-${c}`;
        row.appendChild(tile);
        rowTiles.push(tile);
      }
      card.appendChild(row);
      boardData.push({ row, tiles: rowTiles });
    }

    container.appendChild(card);
    boards.push(boardData);
  }
}

const KB_ROWS = [
  ["q","w","e","r","t","y","u","i","o","p"],
  ["a","s","d","f","g","h","j","k","l"],
  ["Enter","z","x","c","v","b","n","m","Backspace"]
];

function createKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  KB_ROWS.forEach(keys => {
    const row = document.createElement("div");
    row.className = "kb-row";
    keys.forEach(k => {
      const btn = document.createElement("button");
      btn.className = "key" + (k.length > 1 ? " wide" : "");
      btn.dataset.key = k;
      btn.textContent = k === "Backspace" ? "Del" : k;
      btn.addEventListener("click", () => handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function handleKey(key) {
  if (gameOver || revealInProgress) return;

  if (key === "Backspace") {
    if (currentGuess.length > 0) {
      currentGuess.pop();
      updateInputDisplay();
    }
    return;
  }

  if (key === "Enter") {
    if (currentGuess.length < WORD_LENGTH) {
      showToast("Not enough letters");
      shakeInput();
      return;
    }
    const guess = currentGuess.join("");
    if (!VALID_GUESSES.has(guess)) {
      showToast("Not in word list");
      shakeInput();
      return;
    }
    submitGuess(guess);
    return;
  }

  if (/^[a-z]$/.test(key) && currentGuess.length < WORD_LENGTH) {
    currentGuess.push(key);
    updateInputDisplay();
  }
}

function updateInputDisplay() {
  for (let c = 0; c < WORD_LENGTH; c++) {
    const tile = document.getElementById(`input-${c}`);
    if (c < currentGuess.length) {
      tile.textContent = currentGuess[c];
      tile.classList.add("filled");
    } else {
      tile.textContent = "";
      tile.classList.remove("filled");
    }
  }
}

function submitGuess(guess) {
  revealInProgress = true;
  const row = guessNum;

  for (let b = 0; b < NUM_BOARDS; b++) {
    if (solved[b]) continue;

    const boardRow = boards[b][row];
    boardRow.row.style.display = "flex";

    const result = getResult(guess, answers[b]);

    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = boardRow.tiles[c];
      tile.textContent = guess[c];
      tile.classList.add(result[c]);
    }

    if (guess === answers[b]) {
      solved[b] = true;
      const card = document.getElementById(`board-${b}`);
      card.classList.add("solved");
      const badge = document.createElement("div");
      badge.className = "solved-badge";
      badge.textContent = "✓";
      card.appendChild(badge);
    }
  }

  updateKeyboardFromAllBoards(guess);

  guessNum++;
  currentGuess = [];
  updateInputDisplay();
  updateProgress();
  updateGuessCounter();

  const solvedCount = solved.filter(Boolean).length;

  if (solvedCount === NUM_BOARDS) {
    gameOver = true;
    revealInProgress = false;
    showToast(`Solved all ${NUM_BOARDS} in ${guessNum} guesses!`, 3000);
    setTimeout(() => showModal(true), 800);
    return;
  }

  if (guessNum >= MAX_GUESSES) {
    gameOver = true;
    revealInProgress = false;
    const missed = NUM_BOARDS - solvedCount;
    showToast(`Missed ${missed} word${missed > 1 ? "s" : ""}`, 3000);
    setTimeout(() => showModal(false), 800);
    return;
  }

  revealInProgress = false;
  scrollToFirstUnsolved();
}

function getResult(guess, answer) {
  const result = Array(WORD_LENGTH).fill("absent");
  const answerArr = answer.split("");
  const guessArr = guess.split("");
  const used = Array(WORD_LENGTH).fill(false);

  for (let i = 0; i < WORD_LENGTH; i++) {
    if (guessArr[i] === answerArr[i]) {
      result[i] = "correct";
      used[i] = true;
      guessArr[i] = null;
    }
  }

  for (let i = 0; i < WORD_LENGTH; i++) {
    if (guessArr[i] === null) continue;
    for (let j = 0; j < WORD_LENGTH; j++) {
      if (!used[j] && guessArr[i] === answerArr[j]) {
        result[i] = "present";
        used[j] = true;
        break;
      }
    }
  }

  return result;
}

const keyStates = {};
const STATE_PRIORITY = { correct: 3, present: 2, absent: 1 };

function updateKeyboardFromAllBoards(guess) {
  const aggregated = {};
  for (let i = 0; i < WORD_LENGTH; i++) {
    const letter = guess[i];
    let best = "absent";
    for (let b = 0; b < NUM_BOARDS; b++) {
      if (solved[b] && guessNum < MAX_GUESSES) {
        const res = getResult(guess, answers[b]);
        if (STATE_PRIORITY[res[i]] > STATE_PRIORITY[best]) best = res[i];
      } else if (!solved[b]) {
        const res = getResult(guess, answers[b]);
        if (STATE_PRIORITY[res[i]] > STATE_PRIORITY[best]) best = res[i];
      }
    }
    if (!aggregated[letter] || STATE_PRIORITY[best] > STATE_PRIORITY[aggregated[letter]]) {
      aggregated[letter] = best;
    }
  }

  for (const [letter, state] of Object.entries(aggregated)) {
    const prev = keyStates[letter];
    if (!prev || STATE_PRIORITY[state] > STATE_PRIORITY[prev]) {
      keyStates[letter] = state;
      const btn = document.querySelector(`.key[data-key="${letter}"]`);
      if (btn) {
        btn.classList.remove("correct", "present", "absent");
        btn.classList.add(state);
      }
    }
  }
}

function updateProgress() {
  const solvedCount = solved.filter(Boolean).length;
  const pct = (solvedCount / NUM_BOARDS) * 100;
  document.getElementById("progress-fill").style.width = `${pct}%`;
}

function updateGuessCounter() {
  const remaining = MAX_GUESSES - guessNum;
  const solvedCount = solved.filter(Boolean).length;
  document.getElementById("guess-counter").textContent =
    `${remaining} left · ${solvedCount}/${NUM_BOARDS}`;
}

function scrollToFirstUnsolved() {
  for (let b = 0; b < NUM_BOARDS; b++) {
    if (!solved[b]) {
      const card = document.getElementById(`board-${b}`);
      card.scrollIntoView({ behavior: "smooth", block: "nearest" });
      break;
    }
  }
}

function shakeInput() {
  const container = document.getElementById("current-input");
  container.classList.add("shake");
  container.addEventListener("animationend", () => container.classList.remove("shake"), { once: true });
}

function showToast(msg, duration = 1500) {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = msg;
  container.prepend(toast);
  setTimeout(() => toast.classList.add("fade"), duration);
  setTimeout(() => toast.remove(), duration + 400);
}

function showModal(won) {
  const solvedCount = solved.filter(Boolean).length;
  document.getElementById("modal-title").textContent =
    won ? "Amazing!" : "Game Over";
  document.getElementById("modal-subtitle").textContent =
    won ? `You solved all ${NUM_BOARDS} boards in ${guessNum} guesses!`
        : `You solved ${solvedCount} of ${NUM_BOARDS} boards in ${guessNum} guesses.`;
  document.getElementById("stat-solved").textContent = solvedCount;
  document.getElementById("stat-total").textContent = NUM_BOARDS;
  document.getElementById("stat-guesses").textContent = guessNum;

  const wordList = document.getElementById("word-list");
  wordList.innerHTML = "";
  for (let b = 0; b < NUM_BOARDS; b++) {
    const span = document.createElement("span");
    span.className = solved[b] ? "solved-word" : "missed-word";
    span.textContent = `#${b + 1}: ${answers[b].toUpperCase()}`;
    wordList.appendChild(span);
  }

  document.getElementById("modal-overlay").classList.add("active");
}

function hideModal() {
  document.getElementById("modal-overlay").classList.remove("active");
}

function resetGame() {
  hideModal();
  answers = pickUniqueWords(NUM_BOARDS);
  solved = Array(NUM_BOARDS).fill(false);
  guessNum = 0;
  currentGuess = [];
  gameOver = false;
  revealInProgress = false;
  Object.keys(keyStates).forEach(k => delete keyStates[k]);
  createInputRow();
  createBoards();
  updateProgress();
  updateGuessCounter();
  document.querySelectorAll(".key").forEach(btn => {
    btn.classList.remove("correct", "present", "absent");
  });
}

document.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (document.getElementById("modal-overlay").classList.contains("active")) return;
  if (e.key === "Enter") { e.preventDefault(); handleKey("Enter"); }
  else if (e.key === "Backspace") { e.preventDefault(); handleKey("Backspace"); }
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toLowerCase());
});

document.getElementById("play-again").addEventListener("click", resetGame);
document.getElementById("modal-close").addEventListener("click", hideModal);

document.getElementById("theme-toggle").addEventListener("click", () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("doctordle-theme", isDark ? "dark" : "light");
  document.getElementById("theme-toggle").innerHTML = isDark ? "&#9788;" : "&#9790;";
});

(function init() {
  const theme = localStorage.getItem("doctordle-theme");
  if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme:dark)").matches)) {
    document.body.classList.add("dark");
    document.getElementById("theme-toggle").innerHTML = "&#9788;";
  }
  answers = pickUniqueWords(NUM_BOARDS);
  solved = Array(NUM_BOARDS).fill(false);
  createInputRow();
  createBoards();
  createKeyboard();
  updateGuessCounter();
})();
</script>
</body>
